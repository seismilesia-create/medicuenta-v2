<!-- Badge monocromático para notificaciones Android (silueta blanca, fondo TRANSPARENTE). -->
<!-- Android usa solo el canal alfa y lo pinta en blanco/tinte: por eso NO lleva color ni fondo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <mask id="cut">
    <rect width="48" height="48" fill="#fff"/>
    <!-- La línea de pulso se "recorta" (negro en la máscara = transparente) -->
    <path d="M15 24.5H18.5L21.5 17L25.5 31L28.5 24.5H33" fill="none" stroke="#000"
          stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </mask>
  <!-- Silueta del comprobante en blanco, con el pulso recortado -->
  <path d="M14 4H34C36.2 4 38 5.8 38 8V44L33.3 40.7L28.7 44L24 40.7L19.3 44L14.7 40.7L10 44V8C10 5.8 11.8 4 14 4Z"
        fill="#fff" mask="url(#cut)"/>
</svg>
